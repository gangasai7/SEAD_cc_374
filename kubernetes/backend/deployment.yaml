apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: research-app
  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: backend

          image: 178042201905.dkr.ecr.ap-south-1.amazonaws.com/research-backend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config

          volumeMounts:
            - name: reports-storage
              mountPath: /app/reports

      volumes:
        - name: reports-storage
          persistentVolumeClaim:
            claimName: reports-pvc