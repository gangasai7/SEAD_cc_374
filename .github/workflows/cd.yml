name: CD - Deploy to K3s

on:
  workflow_run:
    workflows:
      - "CI - Build Test and Push Docker Images"
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            # Clone repository if it doesn't exist
            if [ ! -d "/home/ubuntu/SEAD_cc_374" ]; then
              echo "Cloning repository..."
              git clone https://github.com/gangasai7/SEAD_cc_374.git /home/ubuntu/SEAD_cc_374
            fi

            cd /home/ubuntu/SEAD_cc_374

            echo "Pulling latest code..."
            git pull origin main

            echo "Logging into Amazon ECR..."
            aws ecr get-login-password --region ap-south-1 | docker login \
              --username AWS \
              --password-stdin \
              178042201905.dkr.ecr.ap-south-1.amazonaws.com

            echo "Creating namespace..."
            kubectl apply -f kubernetes/namespace.yaml

            echo "Refreshing ECR Secret..."
            kubectl delete secret ecr-secret -n research-app --ignore-not-found

            kubectl create secret docker-registry ecr-secret \
              --docker-server=178042201905.dkr.ecr.ap-south-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password="$(aws ecr get-login-password --region ap-south-1)" \
              -n research-app

            echo "Deploying Kubernetes resources..."
            kubectl apply -f kubernetes/backend/
            kubectl apply -f kubernetes/frontend/
            kubectl apply -f kubernetes/ingress.yaml

            echo "Restarting deployments..."
            kubectl rollout restart deployment/backend -n research-app
            kubectl rollout restart deployment/frontend -n research-app

            echo "Waiting for backend rollout..."
            kubectl rollout status deployment/backend -n research-app --timeout=300s

            echo "Waiting for frontend rollout..."
            kubectl rollout status deployment/frontend -n research-app --timeout=300s

            echo "Deployment completed successfully."